name: Deploy Staging

on:
  push:
    branches: [dev]

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: pnpm/action-setup@v4
        with:
          version: 8
      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile
      - name: Build frontend
        run: pnpm --filter @neuroquant/web build
      - name: Validate backend imports
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          python -m compileall backend/app backend/research
      - name: Docker compose staging validation
        run: docker compose config --quiet
      - name: Staging deployment hook
        env:
          STAGING_DEPLOY_WEBHOOK: ${{ secrets.STAGING_DEPLOY_WEBHOOK }}
        run: |
          if [ -n "$STAGING_DEPLOY_WEBHOOK" ]; then
            curl -fsSL -X POST "$STAGING_DEPLOY_WEBHOOK"
          else
            echo "No STAGING_DEPLOY_WEBHOOK configured; validation-only run completed."
          fi
