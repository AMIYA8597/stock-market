name: Weekly Model Retrain

on:
  schedule:
    - cron: '0 3 * * 0'
  workflow_dispatch:

jobs:
  retrain:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Retrain HMM
        run: python -m research.models.hmm_garch.trainer
      - name: Retrain TFT
        run: python -m research.models.tft.trainer
      - name: Retrain GNN
        run: python -m research.models.gnn.trainer
      - name: Recalibrate ensemble
        run: python -m research.models.ensemble.orchestrator
