name: CI

on:
  pull_request:
    branches: [main, dev, develop]
  push:
    branches: [main, dev, develop]

jobs:
  frontend:
    name: Frontend Lint/Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 8
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - name: Install workspace deps
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm lint
      - name: Type check
        run: pnpm type-check
      - name: Test
        run: pnpm --filter @neuroquant/web build

  backend:
    name: Backend Lint/Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      - name: Ruff
        run: ruff check app research tests
      - name: Mypy
        run: mypy app research --strict --ignore-missing-imports
      - name: Pytest
        run: pytest tests -q

  docker-validate:
    name: Docker Compose Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compose config check
        run: docker compose config --quiet

  monorepo-integration:
    name: Monorepo Integration (build + tests)
    runs-on: ubuntu-latest
    needs: [frontend, backend, docker-validate]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 8
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install workspace deps
        run: pnpm install --frozen-lockfile
      - name: Run unified tests
        run: pnpm test