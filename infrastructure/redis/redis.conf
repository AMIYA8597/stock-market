# ════════════════════════════════════════════════════════════════════════════════
# Redis Configuration for NeuroQuant
# ════════════════════════════════════════════════════════════════════════════════
# This configuration supports multiple databases for different purposes:
# - DB 0: Caching (5-min TTL)
# - DB 1: Celery broker (task queue)
# - DB 2: Celery results (task results)

port 6379
bind 0.0.0.0
tcp-backlog 511
timeout 0
tcp-keepalive 300

# ════════════════════════════════════════════════════════════════════════════════
# MEMORY MANAGEMENT
# ════════════════════════════════════════════════════════════════════════════════
# Max memory: 2GB for production, 512MB for development
maxmemory 2gb

# Eviction policy: allkeys-lru (remove least recently used keys when memory full)
maxmemory-policy allkeys-lru

# ════════════════════════════════════════════════════════════════════════════════
# PERSISTENCE
# ════════════════════════════════════════════════════════════════════════════════
# Disable RDB (background snapshots) for cache DB to reduce disk I/O
# Celery broker/results use append-only file (AOF)

# RDB snapshots (for Celery data persistence)
# save "" disables RDB snapshots completely (no background saving)
save ""

# AOF (Append-Only File) for Celery databases
appendonly no

# ════════════════════════════════════════════════════════════════════════════════
# REPLICATION & CLUSTER (future use)
# ════════════════════════════════════════════════════════════════════════════════
replica-read-only yes
repl-diskless-sync no
repl-diskless-sync-delay 10

# ════════════════════════════════════════════════════════════════════════════════
# DATABASES
# ════════════════════════════════════════════════════════════════════════════════
databases 16

# ════════════════════════════════════════════════════════════════════════════════
# LOGGING
# ════════════════════════════════════════════════════════════════════════════════
loglevel notice
syslog-enabled no

# ════════════════════════════════════════════════════════════════════════════════
# CLIENTS
# ════════════════════════════════════════════════════════════════════════════════
maxclients 10000

# ════════════════════════════════════════════════════════════════════════════════
# SLOWLOG (queries slower than 10ms)
# ════════════════════════════════════════════════════════════════════════════════
slowlog-log-slower-than 10000
slowlog-max-len 128

# ════════════════════════════════════════════════════════════════════════════════
# LATENCY MONITOR
# ════════════════════════════════════════════════════════════════════════════════
latency-monitor-threshold 0

# ════════════════════════════════════════════════════════════════════════════════
# SUB/PUB NOTIFICATIONS (for real-time updates)
# ════════════════════════════════════════════════════════════════════════════════
notify-keyspace-events ""

# ════════════════════════════════════════════════════════════════════════════════
# LUA SCRIPTING
# ════════════════════════════════════════════════════════════════════════════════
lua-time-limit 5000

# ════════════════════════════════════════════════════════════════════════════════
# CLUSTER (DISABLED - using single node for now, scale to Cluster for HA)
# ════════════════════════════════════════════════════════════════════════════════
# cluster-enabled yes
# cluster-node-timeout 15000
# cluster-replica-validity-factor 10

# ════════════════════════════════════════════════════════════════════════════════
# SENTINEL (DISABLED - for future HA setup)
# ════════════════════════════════════════════════════════════════════════════════
# sentinel monitor mymaster 127.0.0.1 6379 1

# ════════════════════════════════════════════════════════════════════════════════
# ACL (Access Control - DISABLED for dev, ENABLE for production)
# ════════════════════════════════════════════════════════════════════════════════
# requirepass yourpassword
# aclfile /etc/redis/users.acl

# ════════════════════════════════════════════════════════════════════════════════
# TUNING FOR MARKET DATA STREAMING (high throughput)
# ════════════════════════════════════════════════════════════════════════════════
# Increase backlog for Pub/Sub (Redis streams for market ticks)
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 256mb 64mb 60
client-output-buffer-limit pubsub 32mb 8mb 60

# ════════════════════════════════════════════════════════════════════════════════
# PERFORMANCE TUNING
# ════════════════════════════════════════════════════════════════════════════════
# Disable transparent huge pages for better latency
disable-thp yes

# Increase event loop thread pool for better throughput
io-threaded-reads-processed-per-call 20
io-threaded-writes-processed-per-call 20

# ════════════════════════════════════════════════════════════════════════════════
# MONITORING HOOKS
# ════════════════════════════════════════════════════════════════════════════════
# for system monitoring integration in future
